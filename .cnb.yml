$:
  vscode:
    - docker:
        # build: .devcontainer/Dockerfile.cnb
        # build: .ide/Dockerfile
        # 使用github的官方通用镜像
        image: mcr.microsoft.com/devcontainers/universal:linux
      services:
        - vscode
        - docker
      # 开发环境启动后会执行的任务
      stages:
        - name: setup env
          script: chown -R codespace:codespace /workspace && su codespace
        - name: say hi
          script: echo "hi"

develop:
  push:
    - imports:
      - https://cnb.cool/miojizzy/secrets/-/blob/main/github-secrets.yml
      stages:
        - name: check sync prefix
          script: |
            # 获取最新commit的msg
            LATEST_MSG=$(git log -1 --pretty=%B)
            echo "Latest commit message: $LATEST_MSG"

            # 检查是否是"[sync]"前缀，如果是则直接结束
            if [[ "$LATEST_MSG" == "[sync]"* ]]; then
              echo "检测到[sync]前缀，这是来自其他平台的同步提交，跳过本次同步"
              exit 0
            fi

            echo "正常提交，准备同步到GitHub"

        - name: add sync prefix and push to github
          script: |
            # 获取最新commit的msg
            LATEST_MSG=$(git log -1 --pretty=%B)

            # 修改最新commit的msg，添加[sync]前缀
            GIT_COMMITTER_DATE="$(git log -1 --format=%ci)" \
            git commit --amend -m "[sync] $LATEST_MSG" --no-edit

            echo "已添加[sync]前缀到commit message"

            # 添加远程仓库并推送
            git remote add github https://$GITHUB_TOKEN@$GITHUB_REPO_ARENA_HNSWLIB || git remote set-url github https://$GITHUB_TOKEN@$GITHUB_REPO_ARENA_HNSWLIB
            git push github $(git rev-parse --abbrev-ref HEAD) --force

            echo "✅ 已成功同步到GitHub"
        
