name: Build and Push Devcontainer Base

on:
  push:
    paths:
      - '.devcontainer/Dockerfile.base'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile.base
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arena-hnswlib-base:latest
            ghcr.io/${{ github.repository_owner }}/arena-hnswlib-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
